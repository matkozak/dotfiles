# -- General ---------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"       # true color passthrough
set -gs escape-time 10                   # fast escape (for nvim)
set -g focus-events on                   # nvim autoread support
set -g history-limit 10000
set -g mouse on

# Start numbering at 1 (0 is a reach, especially on phone)
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# -- Prefix ----------------------------------------------------------------

set -g prefix C-Space
unbind C-b
bind C-Space send-prefix                 # double-tap sends literal Ctrl+Space

# -- Keybindings -----------------------------------------------------------

# Splits (mnemonic: / and -)
bind / split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# -- Status bar (Plaster dark) --------------------------------------------

set -g status-style "bg=#3a3a3a,fg=#b5b5b5"
set -g status-left "#[fg=#202020,bg=#69bcde,bold] #S #[default] "
set -g status-right "#[fg=#b5b5b5]%H:%M "
set -g window-status-current-format "#[fg=#202020,bg=#a3c76d,bold] #I:#W "
set -g window-status-format " #I:#W "
